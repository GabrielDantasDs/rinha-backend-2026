events {
    worker_connections 4096;
}
http {
    upstream app {
        server app1:8080;
        server app2:8080;
        keepalive 64;
        keepalive_requests 10000;
        keepalive_timeout 60s;
    }
    server {
        listen 80;
        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}