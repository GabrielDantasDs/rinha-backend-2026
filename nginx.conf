events {}
http {
    upstream app {
        least_conn;
        server app1:8080;
        server app2:8080;
        keepalive 32;
    }
    server {
        listen 80;
        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
