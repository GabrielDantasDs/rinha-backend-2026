version: "3.9"

services:
  app1:
    build: .
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 100mb
          cpus: "0.25"


  app2:
    build: .
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 100mb
          cpus: "0.25"


  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
    deploy:
      resources:
        limits:
          memory: 150mb
          cpus: "0.5"

