version: "3.9"

services:
  app1:
    image: danttera/rinha-2026:latest
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 165mb
          cpus: "0.5"


  app2:
    image: danttera/rinha-2026:latest
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 165mb
          cpus: "0.5"



  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
    deploy:
      resources:
        limits:
          memory: 80mb
          cpus: "0.25"

