version: "3.9"

services:
  app1:
    image: danttera/rinha-2026:latest
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 150mb
          cpus: "0.35"


  app2:
    image: danttera/rinha-2026:latest
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 150mb
          cpus: "0.35"


  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
    deploy:
      resources:
        limits:
          memory: 50mb
          cpus: "0.3"
